services:
  cms:
    build: .
    ports:
      - '4001:4001'
    environment:
      - ASTROCMS_PORT=4001
      - ASTROCMS_PASSWORD=${ASTROCMS_PASSWORD}
      - GIT_PAT=${GIT_PAT}
      - GIT_REPO_URL=${GIT_REPO_URL}
      - GIT_BRANCH=${GIT_BRANCH:-main}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-cms@astrocms.dev}
      - GIT_USER_NAME=${GIT_USER_NAME:-AstroCMS}
    volumes:
      - app-data:/app
      - claude-auth:/root/.claude
    restart: unless-stopped

volumes:
  app-data:
  claude-auth:
